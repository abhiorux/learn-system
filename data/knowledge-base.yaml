nodes:
# ── OpenGL 基础链 ──────────────────────────────────────────────

- id: k000
  title: "图形渲染管线概述"
  description: "理解 GPU 渲染管线的各阶段，从顶点输入到片段输出的完整流程"
  type: concept
  difficulty: 2
  importance: 5
  tags: [pipeline, basics]
  prerequisites: []
  resources:
    - type: doc
      title: "LearnOpenGL - 你好三角形"
      url: "https://learnopengl.com/Getting-started/Hello-Triangle"
    - type: source
      title: "最小三角形示例"
      path: "./courses/01-intro/triangle.cpp"
  estimated_minutes: 30
  related_nodes: [k001]

- id: k001
  title: "着色器基础 (Shader Basics)"
  description: "GLSL 语法、顶点着色器与片段着色器的编写与交互"
  type: concept
  difficulty: 2
  importance: 4
  tags: [shader, glsl]
  prerequisites: [k000]
  resources:
    - type: doc
      title: "LearnOpenGL - 着色器章节"
      url: "https://learnopengl.com/Getting-started/Shaders"
    - type: source
      title: "着色器源码"
      path: "./courses/01-intro/shaders/basic.cpp"
  estimated_minutes: 45
  related_nodes: [k002, k003]

- id: k002
  title: "顶点缓冲区 (VBO/VAO)"
  description: "顶点数据的上传、VAO/VBO 的创建与绑定、顶点属性的配置"
  type: concept
  difficulty: 3
  importance: 4
  tags: [buffers, vao, vbo]
  prerequisites: [k001]
  resources:
    - type: doc
      title: "LearnOpenGL - 顶点属性配置"
      url: "https://learnopengl.com/Getting-started/Vertex-Attributes"
    - type: pitfall
      title: "VAO/VBO 绑定顺序陷阱"
      common_error: "忘记绑定 VAO 就绑定 VBO"
      cause: "VBO 创建在 VAO 绑定之前，导致属性指针配置不生效"
      solution: "始终遵循: 创建VBO → 绑定VAO → 配置属性 → 解绑"
    - type: source
      title: "VBO/VAO 示例"
      path: "./courses/02-buffers/vao_vbo.cpp"
  estimated_minutes: 40
  related_nodes: [k003, k004]

- id: k003
  title: "纹理映射 (Texture Mapping)"
  description: "纹理创建、绑定、过滤方式、环绕模式、多级渐远纹理"
  type: concept
  difficulty: 3
  importance: 4
  tags: [texture, sampling]
  prerequisites: [k002]
  resources:
    - type: doc
      title: "LearnOpenGL - 纹理"
      url: "https://learnopengl.com/Getting-started/Textures"
    - type: pitfall
      title: "纹理坐标超出 [0,1] 范围"
      common_error: "纹理环绕模式未设置导致边缘拉伸"
      cause: "默认环绕为 GL_REPEAT，坐标超出 0~1 时会重复"
      solution: "根据需求设置 GL_CLAMP_TO_EDGE 或 GL_REPEAT"
    - type: source
      title: "纹理加载示例"
      path: "./courses/03-texture/texture.cpp"
  estimated_minutes: 50
  related_nodes: [k004]

- id: k004
  title: "帧缓冲 (Framebuffer Object)"
  description: "FBO 的创建、渲染到纹理、屏幕后处理效果的实现"
  type: concept
  difficulty: 4
  importance: 3
  tags: [fbo, post-processing, rtt]
  prerequisites: [k003]
  resources:
    - type: doc
      title: "LearnOpenGL - 帧缓冲"
      url: "https://learnopengl.com/Advanced-OpenGL/Framebuffers"
    - type: pitfall
      title: "FBO 完整性检查"
      common_error: "渲染到 FBO 后忘记重新绑定到默认帧缓冲"
      cause: "之后所有绘制都在 FBO 的纹理上，看不到任何输出"
      solution: "完成后调用 glBindFramebuffer(GL_FRAMEBUFFER, 0)"
    - type: source
      title: "FBO 后处理示例"
      path: "./courses/04-fbo/post_process.cpp"
  estimated_minutes: 60
  related_nodes: [k101]

# ── OpenGL 进阶 ──────────────────────────────────────────────

- id: k101
  title: "统一缓冲区对象 (UBO)"
  description: "批量传递 uniform 数据、多个着色器共享同一组变换矩阵、UBO 与 std140 布局"
  type: concept
  difficulty: 3
  importance: 4
  tags: [ubo, uniform, performance]
  prerequisites: [k004]
  resources:
    - type: doc
      title: "LearnOpenGL - UBO"
      url: "https://learnopengl.com/Advanced-OpenGL/Advanced-GLSL/#uniform-blocks-objects"
    - type: pitfall
      title: "std140 布局内存对齐"
      common_error: "vec3 填充到 vec4 导致着色器读取错位"
      cause: "std140 要求 vec3 按 16 字节对齐，实际占用 16 字节而非 12"
      solution: "显式补足 vec4 或改用 std430（允许紧密打包）"
    - type: source
      title: "UBO 相机示例"
      path: "./courses/05-ubo/camera_ubo.cpp"
  estimated_minutes: 45
  related_nodes: [k102, k103]

- id: k102
  title: "深度测试与模板缓冲"
  description: "深度缓冲原理、深度函数配置、模板缓冲实现遮罩与轮廓效果"
  type: concept
  difficulty: 3
  importance: 3
  tags: [depth, stencil, testing]
  prerequisites: [k101]
  resources:
    - type: doc
      title: "LearnOpenGL - 深度测试"
      url: "https://learnopengl.com/Advanced-OpenGL/Depth-Testing"
    - type: doc
      title: "LearnOpenGL - 模板测试"
      url: "https://learnopengl.com/Advanced-OpenGL/Stencil-Testing"
    - type: pitfall
      title: "深度缓冲精度问题"
      common_error: "远处物体出现 z-fighting 闪烁"
      cause: "近平面太远或远平面太近导致深度精度分配不足"
      solution: "调近 near 平面、俄罗斯套娃深度缓冲、或使用反向深度"
    - type: source
      title: "Stencil 轮廓示例"
      path: "./courses/06-stencil/outline.cpp"
  estimated_minutes: 50
  related_nodes: [k103]

- id: k103
  title: "混合与透明度"
  description: "Alpha 混合原理、混合函数配置、顺序无关透明度（OIT）技术"
  type: concept
  difficulty: 3
  importance: 3
  tags: [blending, alpha, transparency]
  prerequisites: [k102]
  resources:
    - type: doc
      title: "LearnOpenGL - 混合"
      url: "https://learnopengl.com/Advanced-OpenGL/Blending"
    - type: pitfall
      title: "透明物体必须从远到近排序"
      common_error: "半透明物体渲染顺序错误导致错误覆盖"
      cause: "混合依赖已有的颜色缓冲区内容，乱序导致累积顺序不确定"
      solution: "先渲染不透明物体，再对透明物体按深度从远到近排序绘制"
    - type: source
      title: "混合示例"
      path: "./courses/07-blend/transparency.cpp"
  estimated_minutes: 35
  related_nodes: [k104]

- id: k104
  title: "实例化渲染 (Instanced Rendering)"
  description: "大量重复几何体的高效绘制、glDrawArraysInstanced 与实例属性"
  type: concept
  difficulty: 4
  importance: 3
  tags: [instancing, performance, batching]
  prerequisites: [k103]
  resources:
    - type: doc
      title: "LearnOpenGL - 实例化"
      url: "https://learnopengl.com/Advanced-OpenGL/Instancing"
    - type: pitfall
      title: "InstanceDivisor 未设置导致所有实例相同"
      cause: "实例属性更新频率配置错误，GPU 认为所有实例共享同一数据"
      solution: "glVertexAttribDivisor(index, 1) 使每个实例获得独立属性值"
    - type: source
      title: "Instanced 草地示例"
      path: "./courses/08-instancing/grass.cpp"
  estimated_minutes: 55
  related_nodes: [k105]

- id: k105
  title: "几何着色器与细分着色器"
  description: "在 GPU 上动态生成几何体、图元重启与细分控制"
  type: concept
  difficulty: 5
  importance: 2
  tags: [geometry-shader, tessellation, advanced]
  prerequisites: [k104]
  resources:
    - type: doc
      title: "LearnOpenGL - 几何着色器"
      url: "https://learnopengl.com/Advanced-OpenGL/Geometry-Shader"
    - type: doc
      title: "LearnOpenGL - 细分着色器"
      url: "https://learnopengl.com/Advanced-OpenGL/Tessellation"
    - type: pitfall
      title: "细分导致性能骤降"
      common_error: "过度细分三角形造成 GPU 负载过高"
      cause: "细分因子过大时三角形数量指数级增长"
      solution: "基于屏幕空间大小动态调整细分因子，远处用低细分"
    - type: source
      title: "GS 粒子示例"
      path: "./courses/09-geometry/particle_gs.cpp"
  estimated_minutes: 70
  related_nodes: [k106]

- id: k106
  title: "阴影映射 (Shadow Mapping)"
  description: "从光源视角渲染深度图、PCF 软阴影、多光源阴影与级联阴影（CSM）"
  type: concept
  difficulty: 4
  importance: 3
  tags: [shadow, lighting, pcf]
  prerequisites: [k105]
  resources:
    - type: doc
      title: "LearnOpenGL - 阴影映射"
      url: "https://learnopengl.com/Advanced-OpenGL/Shadows/Shadow-Mapping"
    - type: doc
      title: "PCF 软阴影"
      url: "https://learnopengl.com/Advanced-OpenGL/Shadows/Point-Shadows"
    - type: pitfall
      title: "阴影抖动 (Shadow Acne)"
      common_error: "阴影表面出现条纹状伪影"
      cause: "深度精度不足，同一平面自遮挡"
      solution: "使用 glPolygonOffset 或 bias 偏移阴影贴图采样深度"
    - type: source
      title: "Shadow Map 示例"
      path: "./courses/10-shadow/shadow_map.cpp"
  estimated_minutes: 80
  related_nodes: [k107]

- id: k107
  title: "PBR 基础 (Physically Based Rendering)"
  description: "金属度/粗糙度工作流、BRDF 方程、IBL 环境光照"
  type: concept
  difficulty: 5
  importance: 4
  tags: [pbr, metallic, roughness, ibl]
  prerequisites: [k106]
  resources:
    - type: doc
      title: "LearnOpenGL - PBR 理论"
      url: "https://learnopengl.com/PBR/Theory"
    - type: doc
      title: "LearnOpenGL - IBL"
      url: "https://learnopengl.com/PBR/IBL/Specular-IBL"
    - type: pitfall
      title: "IBL 预计算 mipmap 级别不正确"
      common_error: "HDR 环境贴图模糊或出现接缝"
      cause: "漫反射预过滤环境图时指定的粗糙度对应的 mip 级别不正确"
      solution: "使用与粗糙度对应的精确 mip 级别，边缘处用 clamp 或插值避免接缝"
    - type: source
      title: "PBR 球示例"
      path: "./courses/11-pbr/pbr_spheres.cpp"
  estimated_minutes: 120
  related_nodes: []

# ── Vulkan 入门 ──────────────────────────────────────────────

- id: k200
  title: "Vulkan 概述与核心概念"
  description: "Vulkan 与 OpenGL 的设计差异、对象模型、提交模型与同步原语概述"
  type: concept
  difficulty: 3
  importance: 5
  tags: [vulkan, overview, basics]
  prerequisites: [k001]
  resources:
    - type: doc
      title: "Vulkan 官方教程 - 简介"
      url: "https://vulkan-tutorial.com/Introduction"
    - type: doc
      title: "Vulkan 官方规格文档"
      url: "https://registry.khronos.org/Vulkan/specs/1.3/html/"
    - type: pitfall
      title: "Vulkan 显式管理心智模型"
      common_error: "套用 OpenGL 隐式管理思维，遗漏资源同步或对象创建"
      cause: "Vulkan 不自动管理内存、同步、状态，API 层面全部显式"
      solution: "建立'创建→填充→提交→等待→清理'的完整生命周期思维"
  estimated_minutes: 40
  related_nodes: [k201, k202]

- id: k201
  title: "Vulkan 实例与物理设备 (Instance & Device)"
  description: "VkInstance 创建、验证层配置、VkPhysicalDevice 选择与 VkDevice 创建"
  type: concept
  difficulty: 4
  importance: 4
  tags: [vulkan, instance, device, queue]
  prerequisites: [k200]
  resources:
    - type: doc
      title: "Vulkan 官方教程 - 实例与验证层"
      url: "https://vulkan-tutorial.com/Overview"
    - type: doc
      title: "Vulkan 官方教程 - 物理设备与队列族"
      url: "https://vulkan-tutorial.com/Drawing_a_triangle/Setup/Physical_devices_and_queue_families"
    - type: pitfall
      title: "验证层未启用导致静默崩溃"
      common_error: "未开启验证层时，错误调用只返回 VK_ERROR_INITIALIZATION_FAILED 而无具体原因"
      cause: "Vulkan 驱动遇到错误时若验证层未加载，不会给出诊断信息"
      solution: "开发和调试阶段始终启用 VK_LAYER_KHRONOS_validation"
    - type: source
      title: "Vulkan 初始化代码"
      path: "./courses/vulkan/01-init/vulkan_init.cpp"
  estimated_minutes: 60
  related_nodes: [k202, k203]

- id: k202
  title: "交换链 (Swapchain)"
  description: "VkSwapchain 创建、图像获取、呈现模式（FIFO/Mailbox/Immediate）与图层配置"
  type: concept
  difficulty: 4
  importance: 4
  tags: [vulkan, swapchain, presentation]
  prerequisites: [k201]
  resources:
    - type: doc
      title: "Vulkan 官方教程 - 交换链"
      url: "https://vulkan-tutorial.com/Drawing_a_triangle/Presentation/Swap_chain"
    - type: pitfall
      title: "Mailbox 模式在某些驱动上不支持"
      common_error: "请求 Mailbox 呈现模式但硬件不支持，导致 swapchain 创建失败"
      cause: "呈现模式属于可选特性，驱动可能只支持 FIFO"
      solution: "查询支持模式列表，fallback 到 FIFO，确保遍历顺序正确"
    - type: source
      title: "Swapchain 创建示例"
      path: "./courses/vulkan/02-swapchain/swapchain.cpp"
  estimated_minutes: 55
  related_nodes: [k203]

- id: k203
  title: "命令缓冲与渲染通道 (Command Buffers & Render Pass)"
  description: "命令池分配、命令缓冲录制、渲染通道与子通道依赖、帧率控制"
  type: concept
  difficulty: 4
  importance: 4
  tags: [vulkan, command-buffer, render-pass]
  prerequisites: [k202]
  resources:
    - type: doc
      title: "Vulkan 官方教程 - 渲染通道"
      url: "https://vulkan-tutorial.com/Drawing_a_triangle/Drawing/Rendering_and_presentation"
    - type: doc
      title: "Vulkan 官方教程 - 帧缓冲"
      url: "https://vulkan-tutorial.com/Drawing_a_triangle/Drawing/Framebuffers"
    - type: pitfall
      title: "渲染通道未正确指定 initialLayout / finalLayout"
      common_error: "图像转换时出现未定义布局导致显示黑屏或错误颜色"
      cause: "渲染通道未声明图像在子通道前后的布局转换，驱动无法正确处理"
      solution: "subpass 依赖中明确指定 srcLayout / dstLayout，由渲染通道自动插入转换"
    - type: source
      title: "渲染循环示例"
      path: "./courses/vulkan/03-render/render_loop.cpp"
  estimated_minutes: 70
  related_nodes: [k204]

- id: k204
  title: "描述符集合与管道 (Descriptor Sets & Pipeline)"
  description: " DescriptorSetLayout、PipelineLayout、描述符池分配、渲染管道创建与动态状态"
  type: concept
  difficulty: 5
  importance: 4
  tags: [vulkan, descriptor, pipeline]
  prerequisites: [k203]
  resources:
    - type: doc
      title: "Vulkan 官方教程 - 描述符集合"
      url: "https://vulkan-tutorial.com/Drawing_a_triangle/Graphics_pipeline_basics/Descriptor_set_and_pipeline"
    - type: doc
      title: "Vulkan 官方教程 - 管道"
      url: "https://vulkan-tutorial.com/Drawing_a_triangle/Graphics_pipeline_basics/Shader_modules"
    - type: pitfall
      title: "描述符集合数量超出池大小"
      common_error: "分配超过池容量的描述符集合导致 VK_ERROR_POOL_OUT_OF_MEMORY"
      cause: "描述符池在创建时指定了固定数量，后续分配超出限制"
      solution: "合理估算池大小，或使用 VK_DESCRIPTOR_POOL_CREATE_FREE_DESCRIPTOR_SET_BIT 允许重置"
    - type: source
      title: "Descriptor + Pipeline 示例"
      path: "./courses/vulkan/04-pipeline/pipeline.cpp"
  estimated_minutes: 80
  related_nodes: [k205]

- id: k205
  title: "同步：信号量、围栏与事件 (Synchronization)"
  description: "VkSemaphore、VkFence、VkEvent 的使用场景、Queue Submit 与 Wait 语义"
  type: concept
  difficulty: 5
  importance: 4
  tags: [vulkan, sync, semaphore, fence]
  prerequisites: [k204]
  resources:
    - type: doc
      title: "Vulkan 官方教程 - 同步"
      url: "https://vulkan-tutorial.com/Drawing_a_triangle/Presentation/Synchronization"
    - type: doc
      title: "Vulkan Sync  Slides (Khronos)"
      url: "https://www.khronos.org/blog/vulkan-synchronization-and-memory-management"
    - type: pitfall
      title: "Fence 未重置导致渲染死锁"
      common_error: "等待 fence 但 fence 未在上一帧完成后重置，后续帧永远阻塞"
      cause: "vkWaitForFences 在信号状态上永久等待（未重置）"
      solution: "每帧开始时 vkResetFences，或使用 VK_FENCE_CREATE_SIGNALED_BIT 让 fence 默认有信号"
    - type: source
      title: "同步示例"
      path: "./courses/vulkan/05-sync/sync.cpp"
  estimated_minutes: 65
  related_nodes: []
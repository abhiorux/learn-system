- id: k303
  title: "Vulkan Compute Shader"
  description: "计算着色器调度、存储图像/缓冲区作为计算输出、计算与渲染的队列同步"
  type: concept
  difficulty: 5
  importance: 3
  tags: [vulkan, compute, gpgpu, shader]
  prerequisites: [k302]
  resources:
  - type: doc
    title: "Vulkan 官方教程 - 计算着色器"
    url: "https://vulkan-tutorial.com/Compute_Shader"
  - type: pitfall
    title: "dispatch 组数与着色器期望不匹配"
    common_error: "全局变量/存储缓冲内容未更新"
    cause: "dispatch 参数中组数与着色器期望不符，线程未覆盖全部数据"
    solution: "dispatch 参数必须与 gl_NumWorkGroups 匹配，数据量 = 组数 × 局部大小"
  - type: pitfall
    title: "计算与图形队列未正确同步"
    common_error: "计算结果尚未写完，渲染已经开始读取"
    cause: "计算命令和渲染命令在同一个队列提交，但未使用信号量/围栏控制执行顺序"
    solution: "在提交计算命令后插入 VkSemaphore，渲染 pass 等待该信号量"
  - type: source
    title: "Compute 粒子示例"
    path: "./courses/vulkan/08-compute/particle_compute.cpp"

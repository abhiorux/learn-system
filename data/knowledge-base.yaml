- id: k002
  title: "顶点缓冲区 (VBO/VAO)"
  description: "顶点数据的上传、VAO/VBO 的创建与绑定、顶点属性的配置"
  type: concept
  difficulty: 3
  importance: 4
  tags: [buffers, vao, vbo]
  prerequisites: [k001]

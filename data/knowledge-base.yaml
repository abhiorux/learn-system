- id: k109
  title: "屏幕空间效果 (SSAO / Bloom / Tone Mapping)"
  description: "屏幕空间环境光遮蔽、多采样 bloom、后处理色调映射与 HDR"
  type: concept
  difficulty: 4
  importance: 3
  tags: [ssao, bloom, post-processing, hdr, tonemapping]
  prerequisites: [k108]
  resources:
  - type: doc
    title: "LearnOpenGL - SSAO"
    url: "https://learnopengl.com/Advanced-Lighting/SSAO"
  - type: doc
    title: "LearnOpenGL - Bloom"
    url: "https://learnopengl.com/Advanced-Lighting/Bloom"
  - type: pitfall
    title: "Bloom 提取阈值设置不当导致场景过曝或无效果"
    common_error: "HDR 值总是低于阈值，bloom 完全看不到"
    cause: "brightness = max(color.rgb - threshold, 0) 中阈值过高或光照强度本身不够 HDR"
    solution: "先在明亮场景中目测采样实际亮度值，用 glUniform1f 实时调参找到合适阈值（通常 0.8~1.0）"
  - type: pitfall
    title: "SSAO 采样噪声导致闪动"
    common_error: "SSAO 效果随视角旋转出现颗粒感闪烁"
    cause: "使用固定采样方向而非基于噪声核旋转，旋转视角时采样覆盖区域不同"
    solution: "使用半球采样 + 旋转噪声矩阵，确保样本均匀分布在半球内"

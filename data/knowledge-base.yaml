# ── Vulkan 进阶 ──────────────────────────────────────────────

- id: k301
  title: "Vulkan 纹理与采样器 (Texture & Sampler)"
  description: "VkImage 创建与内存分配、VkSampler 配置（过滤/各向异性/mipmap）、图像布局转换与 барьер"
  type: concept
  difficulty: 4
  importance: 4
  tags: [vulkan, texture, sampler, image-layout]
  prerequisites: [k205]
  resources:
  - type: doc
    title: "Vulkan 官方教程 - 纹理映射"
    url: "https://vulkan-tutorial.com/Generating_Mipmaps"
  - type: doc
    title: "Vulkan 官方教程 - 图像视图与采样器"
    url: "https://vulkan-tutorial.com/Image_view_and_sampler"
  - type: pitfall
    title: "图像布局转换遗漏导致采样出黑纹理"
    common_error: "纹理数据上传完毕但渲染时采样出黑色"
    cause: "图像在显存中的布局（layout）与采样器期望不匹配，需要显式转换"
    solution: "使用 vkCmdPipelineBarrier 将图像从 UNDEFINED/TRANSFER_SRC_OPTIMAL 转换到 SHADER_READ_ONLY_OPTIMAL"
  - type: pitfall
    title: "staging buffer 未等待 transfer 完成就销毁"
    common_error: "staging 内存被释放后 transfer 操作读取到垃圾数据"
    cause: "GPU transfer 命令是异步的，CPU 继续执行不会等待"
    solution: "用 vkWaitForFences 或 dstAccessMask + pipelineBarrier 确保 transfer 完全写入后再销毁 staging"
  - type: source
    title: "纹理加载示例"
    path: "./courses/vulkan/06-texture/texture.cpp"
  estimated_minutes: 70
  related_nodes: [k302]

- id: k302
  title: "Vulkan 深度图像 (Depth Images)"
  description: "深度图像格式选择、深度图像视图创建、多渲染遍与深度测试启用"
  type: concept
  difficulty: 4
  importance: 3
  tags: [vulkan, depth, z-buffer]
  prerequisites: [k301]
  resources:
  - type: doc
    title: "Vulkan 官方教程 - 深度缓冲区"
    url: "https://vulkan-tutorial.com/Depth_buffering"
  - type: pitfall
    title: "深度格式选择不当导致不支持"
    common_error: "只请求 D32_SFLOAT 但部分设备不支持，创建 VkImage 时失败"
    cause: "不同硬件对深度格式支持不同，D32_SFLOAT 不是 universal fallback"
    solution: "优先尝试 D32_SFLOAT，fallback 到 D24_UNORM_S8_UINT 或 D16_UNORM，用 vkGetPhysicalDeviceFormatProperties 查询"
  - type: pitfall
    title: "深度图像未正确清空导致残影"
